version: 2

models:
  - name: fct_sales
    columns: 
      - name: sale_id
        tests: 
          - unique
          - not_null
      - name: store_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_stores')
                field: store_id
      - name: product_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
